<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Navy background with rounded corners -->
  <rect x="0" y="0" width="32" height="32" rx="4" ry="4" fill="#1A2332"/>

  <!-- Three teal horizontal lines representing the brand motif -->
  <!-- Line 1 (top) -->
  <rect x="6" y="9" width="20" height="3" rx="1.5" ry="1.5" fill="#4ECDC4"/>
  <!-- Line 2 (middle) -->
  <rect x="6" y="14.5" width="20" height="3" rx="1.5" ry="1.5" fill="#4ECDC4"/>
  <!-- Line 3 (bottom) -->
  <rect x="6" y="20" width="20" height="3" rx="1.5" ry="1.5" fill="#4ECDC4"/>
</svg>
