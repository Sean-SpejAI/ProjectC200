name: ZAP Baseline (PR preview)

# Passive ZAP scan on every PR's Vercel preview URL. Catches misconfigured
# security headers, leaked CORS, cookie issues, and other Top-10 surface
# without sending attack payloads.
#
# Triggered by `workflow_run` after `Deploy Preview` finishes. We can't
# trigger directly on `pull_request` because the preview URL isn't known
# until the deploy job runs.

on:
  workflow_run:
    workflows: ["Deploy Preview"]
    types: [completed]
  # Manual re-trigger for re-running against an existing preview URL
  # (e.g. after fixing the workflow itself). Skipped by the bot-comment
  # parser, so pr_number + url are required.
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number this run is associated with (for artifact naming + email)"
        required: true
        type: string
      preview_url:
        description: "Full preview URL to scan (e.g. https://your-app-preview.vercel.app)"
        required: true
        type: string

permissions:
  contents: read
  pull-requests: read
  security-events: write
  issues: write

jobs:
  baseline:
    # workflow_run: only run when the upstream Deploy Preview succeeded.
    # workflow_dispatch: always run (user is explicitly invoking it).
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve preview URL
        id: preview
        uses: actions/github-script@v7
        with:
          script: |
            // Manual dispatch: take the URL + PR number straight from inputs.
            if (context.eventName === 'workflow_dispatch') {
              core.setOutput('url', context.payload.inputs.preview_url);
              core.setOutput('pr',  context.payload.inputs.pr_number);
              return;
            }
            // Auto trigger: find the PR for the head SHA, parse the preview
            // URL out of the Vercel bot's comment on that PR.
            const headSha = context.payload.workflow_run.head_sha;
            const prs = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} is:pr ${headSha}`,
            });
            const pr = prs.data.items[0];
            if (!pr) {
              core.setFailed(`No PR found for head SHA ${headSha}`);
              return;
            }
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
            });
            const previewComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Preview deployment')
            );
            if (!previewComment) {
              core.setFailed(`No preview-deployment comment on PR #${pr.number}`);
              return;
            }
            const m = previewComment.body.match(/https?:\/\/\S+\.vercel\.app[^\s)]*/);
            if (!m) {
              core.setFailed(`Could not parse preview URL from comment body`);
              return;
            }
            core.setOutput('url', m[0]);
            core.setOutput('pr', String(pr.number));

      - name: Write Vercel protection-bypass replacer.conf
        # Preview deployments live behind Vercel's "Deployment Protection"
        # — without a bypass header ZAP gets redirected to Vercel's SSO
        # login page and reports findings against THAT page (missing CSP,
        # _vercel_sso_nonce cookie, etc.) instead of our SPA. The
        # automation-bypass secret is generated in the Vercel project
        # settings (Settings → Deployment Protection → Protection Bypass
        # for Automation) and stored as a repo secret. Injecting it as a
        # request header on every ZAP request makes Vercel skip the SSO
        # redirect for the scan. Format docs:
        #   https://www.zaproxy.org/docs/desktop/addons/replacer/
        env:
          BYPASS: ${{ secrets.VERCEL_AUTOMATION_BYPASS_TOKEN }}
        run: |
          if [ -z "$BYPASS" ]; then
            echo "::warning::VERCEL_AUTOMATION_BYPASS_TOKEN secret not set — ZAP will hit the Vercel SSO challenge page and report misleading findings. Set it via Vercel project Settings → Deployment Protection → Protection Bypass for Automation."
            : > replacer.conf
            exit 0
          fi
          # Build replacer.conf via explicit redirects so YAML indentation
          # never leaks into the file. The leading > on each subsequent
          # line appends.
          {
            printf '%s\n' '# Auto-generated by zap-baseline.yml — injects the Vercel Protection Bypass header on every request so ZAP reaches our real SPA instead of the SSO challenge page.'
            printf '%s\n' 'replacer.full_list(0).description=Vercel protection bypass'
            printf '%s\n' 'replacer.full_list(0).enabled=true'
            printf '%s\n' 'replacer.full_list(0).matchtype=REQ_HEADER'
            printf '%s\n' 'replacer.full_list(0).matchstr=x-vercel-protection-bypass'
            printf '%s\n' 'replacer.full_list(0).regex=false'
            printf 'replacer.full_list(0).replacement=%s\n' "$BYPASS"
            printf '%s\n' 'replacer.full_list(0).initiators='
            printf '%s\n' 'replacer.full_list(1).description=Vercel bypass cookie persistence'
            printf '%s\n' 'replacer.full_list(1).enabled=true'
            printf '%s\n' 'replacer.full_list(1).matchtype=REQ_HEADER'
            printf '%s\n' 'replacer.full_list(1).matchstr=x-vercel-set-bypass-cookie'
            printf '%s\n' 'replacer.full_list(1).regex=false'
            printf '%s\n' 'replacer.full_list(1).replacement=true'
            printf '%s\n' 'replacer.full_list(1).initiators='
          } > replacer.conf
          echo "wrote replacer.conf ($(wc -l < replacer.conf) lines, $(stat -c%s replacer.conf) bytes)"

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ steps.preview.outputs.url }}
          rules_file_name: .zap/rules.tsv
          # `replacer.conf` is mounted at /zap/wrk inside the action's
          # container (same convention as zap-scan.yml). The file is empty
          # when the bypass secret isn't set — ZAP tolerates that and
          # behaves as if no replacer was configured.
          cmd_options: -z "-configFile /zap/wrk/replacer.conf"
          allow_issue_writing: false
          fail_action: false

      - name: Upload raw reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-pr-${{ steps.preview.outputs.pr }}
          path: |
            report_html.html
            report_md.md
            report_json.json
          retention-days: 90
          if-no-files-found: warn

      - name: Convert JSON to SARIF
        if: always()
        run: |
          if [ -f report_json.json ]; then
            node .zap/zap-json-to-sarif.mjs report_json.json zap-baseline.sarif "ZAP Baseline"
          else
            echo '{"version":"2.1.0","runs":[]}' > zap-baseline.sarif
          fi

      - name: Upload SARIF to GitHub Code Scanning
        # Code Scanning requires GitHub Advanced Security on private repos;
        # non-fatal so a workflow without GHAS still surfaces the artifacts.
        if: always() && hashFiles('zap-baseline.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: zap-baseline.sarif
          category: zap-baseline

      - name: Upload SARIF as artifact (fallback when Code Scanning is off)
        if: always() && hashFiles('zap-baseline.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-pr-${{ steps.preview.outputs.pr }}-sarif
          path: zap-baseline.sarif
          retention-days: 90

      - name: Email report
        if: always() && hashFiles('report_json.json') != ''
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ZAP_REPORT_TO: ${{ secrets.ZAP_REPORT_TO }}
          SCAN_KIND: baseline
          SCAN_ENV: pr-${{ steps.preview.outputs.pr }}
          SCAN_TARGET: ${{ steps.preview.outputs.url }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node .zap/send-report.mjs report_json.json report_html.html
